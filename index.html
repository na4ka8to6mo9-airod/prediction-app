<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常予想アプリ（Supabase版）</title>
    <!-- 【修正ポイント】ライブラリのURLを正しくフルで記述します -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .page { display: none; }
        .active { display: block; }
        button { padding: 12px 24px; border-radius: 25px; cursor: pointer; margin: 10px; border: none; background: #007bff; color: white; }
        input { padding: 10px; margin: 5px; width: 80%; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. ログイン画面 -->
    <div id="page-login" class="page active">
        <h1>🔑 ログイン / 登録 v0.002</h1>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="signUp()">新規登録</button>
        <button onclick="signIn()">ログイン</button>
        <p style="font-size: 12px;">※登録時、確認メールが届く場合があります</p>
    </div>

    <!-- 2. ホーム画面 -->
    <div id="page-home" class="page">
        <h1>🏠 ホーム</h1>
        <p id="user-email"></p>
        <div style="font-size: 24px; color: #28a745;">保有ポイント: <span id="current-pts">--</span> pt</div>
        <button onclick="navigate('page-predict')">予想に参加する</button>
        <button onclick="signOut()" style="background: #6c757d;">ログアウト</button>
    </div>

    <!-- 3. 予想画面 -->
    <div id="page-predict" class="page">
        <h1>🔮 予想する</h1>
        <h3 id="prediction-title">読み込み中...</h3>
        
        <!-- 表記を Yes / No に変更 -->
        <button onclick="makePrediction(true)" style="background-color: #28a745;">Yes (そう思う)</button>
        <button onclick="makePrediction(false)" style="background-color: #dc3545;">No (思わない)</button>
        <br>
        <button class="secondary" onclick="navigate('page-home')" style="background-color: #6c757d;">戻る</button>

        <input type="hidden" id="prediction-id">
    </div>

    <!-- 4. 結果画面 -->
    <div id="page-result" class="page">
        <h1>🏁 結果</h1>
        <div id="result-message" style="margin: 20px 0; font-weight: bold;"></div>
        <button onclick="navigate('page-home')">ホームへ戻る</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://nbukravpkrdtpfkbmhvf.supabase.co';
    const supabaseKey = 'sb_publishable_S7biSRXNXBIgW1bG-Hjf7Q_m9VbdUCq';
    
    // window.supabaseから確実に初期化
    const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    let points = 100;
    let userId = null;

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await _supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert("登録確認メールを確認してください！");
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else checkUser();
    }

    async function signOut() {
        await _supabase.auth.signOut();
        location.reload();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            userId = user.id;
            document.getElementById('user-email').innerText = user.email;
            
            const { data, error } = await _supabase
                .from('user_profiles')
                .select('points')
                .eq('id', userId)
                .single();
            
            if (data) points = data.points;
            updateDisplay();
            navigate('page-home');
        }
    }

    function updateDisplay() {
        document.getElementById('current-pts').innerText = points;
    }

    function navigate(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // --- 修正版：お題を読み込んで表示する関数 ---
    async function loadPredictions() {
        const { data, error } = await _supabase
            .from('predictions')
            .select('*')
            .eq('status', 'open')
            .order('target_date', { ascending: true })
            .limit(1)
            .single();

        if (data) {
            // 画面にお題を表示
            document.getElementById('prediction-title').innerText = data.title;
            document.getElementById('prediction-id').value = data.id; // 隠し要素にIDを持たせる
        }
    }

    // --- 予想を保存する関数 ---
    async function makePrediction(choice) {
        const predictionId = document.getElementById('prediction-id').value;
        if (!predictionId) {
            alert("お題が読み込まれていません。");
            return;
        }
        
        const { error } = await _supabase
            .from('user_bets')
            .insert({
                user_id: userId,
                prediction_id: predictionId,
                prediction_choice: choice
            });

        if (error) {
            if (error.code === '23505') alert("このお題には既に回答済みです！");
            else alert("エラー: " + error.message);
        } else {
            // メッセージを調整
            const choiceText = choice ? "Yes" : "No";
            document.getElementById('result-message').innerText = `「${choiceText}」で予想を受け付けました！結果をお楽しみに。`;
            navigate('page-result');
        }
    }

    // --- 起動時に実行する処理 ---
    async function init() {
        await checkUser();      // ログイン確認
        await loadPredictions(); // お題の読み込み
    }

    init();
</script>
</body>
</html>
